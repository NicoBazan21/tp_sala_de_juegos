<form [formGroup]="form">
  <h2>
    <span class="entypo-login">
      <i class="fa fa-sign-in">
      </i>
    </span>
    Login
  </h2>

  <button (click)="iniciarSesion()">
    <span class="entypo-lock">
      <i class="fa fa-lock"></i>
    </span>
  </button>

  <span class="entypo-user inputUserIcon">
     <i class="fa fa-user"></i>
   </span>
  <input type="text" class="user" placeholder="usuario" formControlName="usuario"/>
  <small class="text-danger">
    {{usuario?.getError('usuarioExiste')}}
  </small>

  <span class="entypo-reply inputPassIcon">
    <i class="fa fa-key"></i>
  </span>
  <input type="password" class="pass" placeholder="clave" formControlName="clave"/>
  <ng-container *ngIf="clave?.hasError('minlength')">
    <small class="text-danger">
      La clave debe tener mínimo {{clave?.getError('minlength').requiredLength}} caracteres
    </small>
  </ng-container>
  <br>
  <ng-container *ngIf="incorrect">
    <small class="text-danger">
      Credenciales incorrectas
    </small>
  </ng-container>

  <ng-container *ngIf="home">
    <button class="botonH entypo-user-add" routerLink="/home"> Ir al Home
    </button>
  </ng-container>

</form>
